<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
      .dashed { stroke-dasharray: 6 5; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="304" class="box"/>
  <text x="48" y="62" class="title">C10: Web Workers - Main Thread &lt;-&gt; Worker Context</text>
  <text x="48" y="88" class="muted">Fokus: create worker, load script, message passing (structured clone), dan event loop terpisah.</text>

  <rect x="60" y="120" width="360" height="190" class="box"/>
  <text x="80" y="150" class="text">Main Thread</text>
  <text x="80" y="172" class="muted">UI + DOM + event loop</text>
  <text x="80" y="206" class="muted">1) new Worker(url)</text>
  <text x="80" y="228" class="muted">2) postMessage(task)</text>
  <text x="80" y="250" class="muted">3) onmessage(result)</text>
  <text x="80" y="272" class="muted">4) terminate()</text>

  <rect x="560" y="120" width="360" height="190" class="box"/>
  <text x="580" y="150" class="text">Worker Context</text>
  <text x="580" y="172" class="muted">Dedicated worker global scope</text>
  <text x="580" y="206" class="muted">- Load &amp; execute worker script</text>
  <text x="580" y="228" class="muted">- Receive message event</text>
  <text x="580" y="250" class="muted">- Process task (worker event loop)</text>
  <text x="580" y="272" class="muted">- postMessage(result)</text>

  <path d="M 420 190 L 560 190" class="arrow" marker-end="url(#arrowHead)"/>
  <text x="438" y="178" class="muted">structured clone</text>
  <path d="M 560 240 L 420 240" class="arrow" marker-end="url(#arrowHead)"/>
  <text x="462" y="262" class="muted">message event</text>

  <path d="M 490 120 L 490 310" class="arrow dashed"/>
  <text x="440" y="320" class="muted">No direct DOM access</text>
</svg>
