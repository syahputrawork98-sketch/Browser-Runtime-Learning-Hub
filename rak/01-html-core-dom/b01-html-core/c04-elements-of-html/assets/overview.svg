<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="320" viewBox="0 0 980 320">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="264" class="box"/>
  <text x="48" y="62" class="title">C04: Elements of HTML - Elemen Sebagai Unit Perilaku</text>
  <text x="48" y="88" class="muted">Fokus: elemen di DOM, side effects, dan integration points ke parsing/loading/rendering.</text>

  <rect x="60" y="120" width="240" height="92" class="box"/>
  <text x="80" y="152" class="text">DOM Node</text>
  <text x="80" y="174" class="muted">element di tree</text>

  <rect x="360" y="120" width="240" height="92" class="box"/>
  <text x="380" y="152" class="text">Side Effects</text>
  <text x="380" y="174" class="muted">load, state, events</text>

  <rect x="660" y="120" width="240" height="92" class="box"/>
  <text x="680" y="152" class="text">Integration</text>
  <text x="680" y="174" class="muted">C13/C07/C15</text>

  <path d="M 300 166 L 360 166" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 600 166 L 660 166" class="arrow" marker-end="url(#arrowHead)"/>

  <text x="60" y="256" class="muted">Contoh: &lt;link&gt; dan &lt;script&gt; bisa memicu loading dan mempengaruhi parsing/rendering.</text>
</svg>
