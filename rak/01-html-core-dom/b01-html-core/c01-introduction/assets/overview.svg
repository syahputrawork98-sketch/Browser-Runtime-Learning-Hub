<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="280" viewBox="0 0 980 280">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="224" class="box"/>
  <text x="48" y="62" class="title">C01: Introduction - Cara Membaca "Buku Besar"</text>
  <text x="48" y="88" class="muted">Tujuan: menghubungkan HTML Standard (spec) -> struktur repo (rak/buku/bab) -> fokus cara kerja browser.</text>

  <rect x="60" y="120" width="240" height="84" class="box"/>
  <text x="80" y="154" class="text">HTML Standard</text>
  <text x="80" y="176" class="muted">Spec normatif (algoritma)</text>

  <rect x="360" y="120" width="240" height="84" class="box"/>
  <text x="380" y="154" class="text">Pemetaan Repo</text>
  <text x="380" y="176" class="muted">Rak -> Buku -> Bab</text>

  <rect x="660" y="120" width="240" height="84" class="box"/>
  <text x="680" y="154" class="text">Penulisan Bab</text>
  <text x="680" y="176" class="muted">Skenario -> alur -> batasan</text>

  <path d="M 300 162 L 360 162" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 600 162 L 660 162" class="arrow" marker-end="url(#arrowHead)"/>

  <text x="60" y="236" class="muted">Catat versi/tanggal + lokasi section agar selalu bisa disinkronkan saat spec berubah.</text>
</svg>
