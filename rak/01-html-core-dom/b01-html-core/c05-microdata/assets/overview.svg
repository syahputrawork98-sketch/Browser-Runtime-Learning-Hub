<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="320" viewBox="0 0 980 320">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="264" class="box"/>
  <text x="48" y="62" class="title">C05: Microdata - Data Terstruktur Di Atas DOM</text>
  <text x="48" y="88" class="muted">Fokus: atribut microdata -> model item/properties -> ekstraksi.</text>

  <rect x="60" y="120" width="260" height="92" class="box"/>
  <text x="80" y="152" class="text">DOM + Atribut</text>
  <text x="80" y="174" class="muted">itemscope, itemtype, itemprop</text>

  <rect x="360" y="120" width="260" height="92" class="box"/>
  <text x="380" y="152" class="text">Model Microdata</text>
  <text x="380" y="174" class="muted">item + properties</text>

  <rect x="660" y="120" width="260" height="92" class="box"/>
  <text x="680" y="152" class="text">Ekstraksi</text>
  <text x="680" y="174" class="muted">data terstruktur</text>

  <path d="M 320 166 L 360 166" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 620 166 L 660 166" class="arrow" marker-end="url(#arrowHead)"/>

  <text x="60" y="256" class="muted">Jika DOM berubah, hasil ekstraksi bisa berubah karena model mengikuti tree.</text>
</svg>
