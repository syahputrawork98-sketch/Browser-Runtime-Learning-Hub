<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="244" class="box"/>
  <text x="48" y="62" class="title">C03: Semantics, Structure, and APIs - Dokumen HTML Sebagai State</text>
  <text x="48" y="88" class="muted">Fokus: struktur DOM + metadata dokumen + lifecycle loading + API yang observable.</text>

  <rect x="60" y="120" width="250" height="92" class="box"/>
  <text x="80" y="152" class="text">DOM Tree</text>
  <text x="80" y="174" class="muted">struktur dokumen</text>

  <rect x="365" y="120" width="250" height="92" class="box"/>
  <text x="385" y="152" class="text">Document State</text>
  <text x="385" y="174" class="muted">loading, ready, metadata</text>

  <rect x="670" y="120" width="250" height="92" class="box"/>
  <text x="690" y="152" class="text">Document APIs</text>
  <text x="690" y="174" class="muted">observable behavior</text>

  <path d="M 310 166 L 365 166" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 615 166 L 670 166" class="arrow" marker-end="url(#arrowHead)"/>

  <text x="60" y="246" class="muted">Integration points: DOM Standard, rendering pipeline, dan lifecycle loading.</text>
</svg>
