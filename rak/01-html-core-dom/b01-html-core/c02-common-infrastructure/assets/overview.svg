<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="280" viewBox="0 0 980 280">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="224" class="box"/>
  <text x="48" y="62" class="title">C02: Common Infrastructure - Fondasi Lintas Bab</text>
  <text x="48" y="88" class="muted">Tujuan: satu tempat untuk istilah dan konvensi, agar bab lain tidak mengulang definisi.</text>

  <rect x="60" y="120" width="200" height="84" class="box"/>
  <text x="80" y="154" class="text">Terminology</text>
  <text x="80" y="176" class="muted">istilah & definisi</text>

  <rect x="290" y="120" width="200" height="84" class="box"/>
  <text x="310" y="154" class="text">Microsyntaxes</text>
  <text x="310" y="176" class="muted">format teks atribut</text>

  <rect x="520" y="120" width="200" height="84" class="box"/>
  <text x="540" y="154" class="text">Policies</text>
  <text x="540" y="176" class="muted">kontrol fitur</text>

  <rect x="750" y="120" width="200" height="84" class="box"/>
  <text x="770" y="154" class="text">Integration</text>
  <text x="770" y="176" class="muted">URL/Fetch/DOM</text>

  <path d="M 260 162 L 290 162" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 490 162 L 520 162" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 720 162 L 750 162" class="arrow" marker-end="url(#arrowHead)"/>

  <text x="60" y="236" class="muted">Saat bab lain menyebut istilah, rujuk ke C02 untuk definisi dan konvensi.</text>
</svg>
