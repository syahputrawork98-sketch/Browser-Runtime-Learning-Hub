<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="380" viewBox="0 0 980 380">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
      .dashed { stroke-dasharray: 6 5; }
      .cap { stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="324" class="box"/>
  <text x="48" y="62" class="title">C13: HTML Parsing - Tokenizer + Tree Builder + Script Interruption</text>
  <text x="48" y="88" class="muted">Fokus: alur stateful, error-recovery, dan titik berhenti saat script.</text>

  <rect x="60" y="118" width="230" height="90" class="box"/>
  <text x="80" y="148" class="text">Input Stream</text>
  <text x="80" y="170" class="muted">bytes -&gt; decode</text>
  <text x="80" y="192" class="muted">characters (streaming)</text>

  <rect x="320" y="118" width="260" height="140" class="box"/>
  <text x="340" y="148" class="text">Tokenizer</text>
  <text x="340" y="170" class="muted">state machine</text>
  <text x="340" y="192" class="muted">start/end tag, text,</text>
  <text x="340" y="214" class="muted">comment, doctype</text>
  <text x="340" y="236" class="muted">error-recovery (konsep)</text>

  <rect x="620" y="118" width="300" height="140" class="box"/>
  <text x="640" y="148" class="text">Tree Builder</text>
  <text x="640" y="170" class="muted">insertion modes</text>
  <text x="640" y="192" class="muted">build DOM nodes</text>
  <text x="640" y="214" class="muted">foster parenting (konsep)</text>
  <text x="640" y="236" class="muted">adoption agency (konsep)</text>

  <path d="M 290 162 L 320 162" class="arrow cap" marker-end="url(#arrowHead)"/>
  <path d="M 580 162 L 620 162" class="arrow cap" marker-end="url(#arrowHead)"/>
  <text x="468" y="152" class="muted">tokens</text>

  <rect x="620" y="274" width="300" height="60" class="box"/>
  <text x="640" y="304" class="text">DOM (hasil)</text>
  <text x="640" y="326" class="muted">nodes + attributes</text>
  <path d="M 770 258 L 770 274" class="arrow cap" marker-end="url(#arrowHead)"/>

  <!-- Script interruption -->
  <rect x="320" y="274" width="260" height="60" class="box"/>
  <text x="340" y="304" class="text">Script Interruption</text>
  <text x="340" y="326" class="muted">parser may block / re-enter</text>

  <path d="M 580 236 C 560 270, 520 280, 450 294" class="arrow dashed cap" marker-end="url(#arrowHead)"/>
  <text x="496" y="266" class="muted">hit &lt;script&gt;</text>

  <path d="M 450 274 C 500 250, 560 240, 620 236" class="arrow dashed cap" marker-end="url(#arrowHead)"/>
  <text x="410" y="264" class="muted">DOM/script can affect parsing</text>
</svg>

