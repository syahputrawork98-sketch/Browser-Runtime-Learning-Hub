<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="330" viewBox="0 0 980 330">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="274" class="box"/>
  <text x="48" y="62" class="title">C06: User Interaction - Input -> Event -> State</text>
  <text x="48" y="88" class="muted">Fokus: hit testing, dispatch event, update state (focus/active), lalu handler.</text>

  <rect x="60" y="120" width="210" height="92" class="box"/>
  <text x="80" y="152" class="text">Input Device</text>
  <text x="80" y="174" class="muted">pointer/keyboard</text>

  <rect x="300" y="120" width="210" height="92" class="box"/>
  <text x="320" y="152" class="text">Hit Testing</text>
  <text x="320" y="174" class="muted">target element</text>

  <rect x="540" y="120" width="210" height="92" class="box"/>
  <text x="560" y="152" class="text">Event Dispatch</text>
  <text x="560" y="174" class="muted">capture/target/bubble</text>

  <rect x="780" y="120" width="160" height="92" class="box"/>
  <text x="800" y="152" class="text">Handler</text>
  <text x="800" y="174" class="muted">JS listeners</text>

  <path d="M 270 166 L 300 166" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 510 166 L 540 166" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 750 166 L 780 166" class="arrow" marker-end="url(#arrowHead)"/>

  <rect x="300" y="230" width="450" height="52" class="box"/>
  <text x="320" y="262" class="text">State Update</text>
  <text x="450" y="262" class="muted">focus / active element / selection (jika relevan)</text>
</svg>
