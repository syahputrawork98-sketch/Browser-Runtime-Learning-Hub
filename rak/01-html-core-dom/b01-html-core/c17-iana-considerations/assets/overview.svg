<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
      .dashed { stroke-dasharray: 6 5; }
      .cap { stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="304" class="box"/>
  <text x="48" y="62" class="title">C17: IANA Considerations - Media Type Label Drives Handling</text>
  <text x="48" y="88" class="muted">Fokus: registri media type -&gt; Content-Type -&gt; keputusan runtime (parser/handler).</text>

  <rect x="60" y="120" width="240" height="90" class="box"/>
  <text x="80" y="150" class="text">IANA Registry (konsep)</text>
  <text x="80" y="172" class="muted">media type names</text>
  <text x="80" y="194" class="muted">semantics contract</text>

  <rect x="340" y="120" width="260" height="90" class="box"/>
  <text x="360" y="150" class="text">Server Response</text>
  <text x="360" y="172" class="muted">Content-Type header</text>
  <text x="360" y="194" class="muted">may be wrong/missing</text>

  <rect x="640" y="92" width="280" height="118" class="box"/>
  <text x="660" y="122" class="text">Browser Handling</text>
  <text x="660" y="144" class="muted">choose parser/decoder</text>
  <text x="660" y="166" class="muted">HTML vs XML vs others</text>
  <text x="660" y="188" class="muted">security policies apply</text>

  <path d="M 300 165 L 340 165" class="arrow cap" marker-end="url(#arrowHead)"/>
  <path d="M 600 165 L 640 150" class="arrow cap" marker-end="url(#arrowHead)"/>

  <rect x="640" y="232" width="280" height="80" class="box"/>
  <text x="660" y="262" class="text">Mitigation (konsep)</text>
  <text x="660" y="284" class="muted">sniffing / blocking / fallback</text>

  <path d="M 780 210 L 780 232" class="arrow dashed cap" marker-end="url(#arrowHead)"/>
  <text x="690" y="224" class="muted">if label unreliable</text>
</svg>

