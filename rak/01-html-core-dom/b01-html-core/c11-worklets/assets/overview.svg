<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
      .dashed { stroke-dasharray: 6 5; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="304" class="box"/>
  <text x="48" y="62" class="title">C11: Worklets - Module -> Subsystem Phase -> Callback</text>
  <text x="48" y="88" class="muted">Fokus: worklet sebagai modul kecil yang dipanggil oleh subsistem tertentu, bukan pengganti worker.</text>

  <rect x="60" y="120" width="280" height="190" class="box"/>
  <text x="80" y="150" class="text">Main Thread</text>
  <text x="80" y="172" class="muted">register/addModule</text>
  <text x="80" y="206" class="muted">- Load module</text>
  <text x="80" y="228" class="muted">- Configure (high level)</text>
  <text x="80" y="250" class="muted">- No direct execution loop</text>

  <rect x="400" y="120" width="520" height="190" class="box"/>
  <text x="420" y="150" class="text">Subsystem</text>
  <text x="420" y="172" class="muted">rendering / audio / other integration</text>
  <text x="420" y="206" class="muted">1) Choose phase (execution point)</text>
  <text x="420" y="228" class="muted">2) Invoke worklet callback</text>
  <text x="420" y="250" class="muted">3) Consume output</text>

  <path d="M 340 166 L 400 166" class="arrow" marker-end="url(#arrowHead)"/>
  <text x="350" y="188" class="muted">module</text>

  <path d="M 60 310 L 920 310" class="arrow dashed"/>
  <text x="60" y="328" class="muted">Worklets biasanya dibatasi: akses DOM tidak tersedia, dan eksekusi terikat phase subsistem.</text>
</svg>
