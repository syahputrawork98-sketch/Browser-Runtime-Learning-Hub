<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="330" viewBox="0 0 980 330">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="274" class="box"/>
  <text x="48" y="62" class="title">C08: Web Application APIs - Scheduling -> Callback -> Effects</text>
  <text x="48" y="88" class="muted">Fokus: pola umum API platform; detail event loop ada di rak JavaScript Runtime.</text>

  <rect x="60" y="120" width="230" height="92" class="box"/>
  <text x="80" y="152" class="text">Call API</text>
  <text x="80" y="174" class="muted">timer/messaging</text>

  <rect x="320" y="120" width="230" height="92" class="box"/>
  <text x="340" y="152" class="text">Schedule</text>
  <text x="340" y="174" class="muted">task queue</text>

  <rect x="580" y="120" width="230" height="92" class="box"/>
  <text x="600" y="152" class="text">Callback</text>
  <text x="600" y="174" class="muted">JS executes</text>

  <rect x="840" y="120" width="120" height="92" class="box"/>
  <text x="858" y="152" class="text">Effects</text>
  <text x="858" y="174" class="muted">DOM/render</text>

  <path d="M 290 166 L 320 166" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 550 166 L 580 166" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 810 166 L 840 166" class="arrow" marker-end="url(#arrowHead)"/>

  <text x="60" y="256" class="muted">Untuk messaging lintas konteks, lihat C09 (Communication) dan C10 (Workers).</text>
</svg>
