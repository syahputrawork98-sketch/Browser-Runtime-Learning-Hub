<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .title { font: 700 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .text { font: 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #111827; }
      .muted { font: 12px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2; fill: none; }
      .dashed { stroke-dasharray: 6 5; }
      .cap { stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="24" y="28" width="932" height="364" class="box"/>
  <text x="48" y="62" class="title">C12: Web Storage - Origin Scoping &amp; Lifecycle</text>
  <text x="48" y="88" class="muted">localStorage: persist &amp; shared per origin. sessionStorage: terikat browsing context (tab).</text>

  <!-- Entry point -->
  <rect x="60" y="112" width="250" height="70" class="box"/>
  <text x="80" y="142" class="text">Script</text>
  <text x="80" y="164" class="muted">localStorage / sessionStorage</text>

  <rect x="340" y="112" width="290" height="70" class="box"/>
  <text x="360" y="142" class="text">Browser Routing</text>
  <text x="360" y="164" class="muted">select storage area</text>
  <text x="360" y="182" class="muted">by: origin + type + context</text>

  <path d="M 310 147 L 340 147" class="arrow cap" marker-end="url(#arrowHead)"/>

  <!-- Origin X -->
  <rect x="60" y="206" width="420" height="170" class="box"/>
  <text x="80" y="236" class="text">Origin X</text>
  <text x="80" y="258" class="muted">contoh: https://app.example</text>

  <!-- localStorage cylinder (shared) -->
  <rect x="90" y="286" width="150" height="66" class="box"/>
  <ellipse cx="165" cy="286" rx="75" ry="14" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="110" y="316" class="muted">localStorage</text>
  <text x="110" y="336" class="muted">persist, shared</text>

  <!-- Tab A -->
  <rect x="260" y="276" width="150" height="38" class="box"/>
  <text x="276" y="300" class="muted">Tab A</text>
  <rect x="260" y="320" width="150" height="44" class="box"/>
  <text x="276" y="348" class="muted">sessionStorage A</text>

  <!-- Tab B -->
  <rect x="330" y="276" width="130" height="38" class="box"/>
  <text x="346" y="300" class="muted">Tab B</text>
  <rect x="330" y="320" width="130" height="44" class="box"/>
  <text x="346" y="348" class="muted">sessionStorage B</text>

  <path d="M 240 319 L 260 319" class="arrow cap" marker-end="url(#arrowHead)"/>
  <path d="M 240 319 L 330 319" class="arrow cap" marker-end="url(#arrowHead)"/>
  <text x="86" y="370" class="muted">sessionStorage dipisah per tab</text>

  <!-- Origin Y -->
  <rect x="520" y="206" width="400" height="170" class="box"/>
  <text x="540" y="236" class="text">Origin Y</text>
  <text x="540" y="258" class="muted">contoh: https://other.example</text>

  <rect x="550" y="286" width="150" height="66" class="box"/>
  <ellipse cx="625" cy="286" rx="75" ry="14" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="570" y="316" class="muted">localStorage</text>
  <text x="570" y="336" class="muted">terpisah</text>

  <rect x="730" y="286" width="170" height="38" class="box"/>
  <text x="746" y="310" class="muted">Tab</text>
  <rect x="730" y="330" width="170" height="44" class="box"/>
  <text x="746" y="358" class="muted">sessionStorage</text>

  <!-- Routing split -->
  <path d="M 630 147 C 560 190, 460 200, 270 226" class="arrow cap" marker-end="url(#arrowHead)"/>
  <text x="520" y="190" class="muted">origin = X</text>
  <path d="M 630 147 C 700 190, 780 200, 820 226" class="arrow cap" marker-end="url(#arrowHead)"/>
  <text x="710" y="190" class="muted">origin = Y</text>

  <!-- Note -->
  <path d="M 60 188 L 920 188" class="arrow dashed"/>
  <text x="60" y="202" class="muted">Catatan: mode privat/partitioning dapat menambah dimensi key (mis. top-level site), mempengaruhi ketersediaan storage.</text>
</svg>

